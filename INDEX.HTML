<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Simulación Tienda Online</title>

<style>
body{
font-family: Arial, sans-serif;
margin:0;
background:#f4f4f4;
}

header{
background:#0a2a66;
color:white;
padding:15px;
text-align:center;
}

nav{
background:#333;
padding:10px;
text-align:center;
}

nav a{
color:white;
margin:10px;
text-decoration:none;
font-weight:bold;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:20px;
}

.product{
background:white;
width:250px;
margin:15px;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px gray;
text-align:center;
}

.product img{
width:100%;
height:150px;
object-fit:cover;
}

button{
background:#0a2a66;
color:white;
border:none;
padding:10px;
border-radius:5px;
cursor:pointer;
}

footer{
background:#222;
color:white;
text-align:center;
padding:15px;
margin-top:20px;
}
</style>

</head>

<body>

<header>
<h1>Mi Tienda Online (Simulación)</h1>
<p>Proyecto de laboratorio e-commerce</p>
</header>

<nav>
<a href="#">Inicio</a>
<a href="#">Productos</a>
<a href="#">Servicios</a>
<a href="#">Contacto</a>
</nav>

<section class="container">

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>Producto 1</h3>
<p>$500 MXN</p>
<button>Comprar</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>Producto 2</h3>
<p>$750 MXN</p>
<button>Comprar</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>Producto 3</h3>
<p>$1200 MXN</p>
<button>Comprar</button>
</div>

</section>

<footer>
<p>© 2026 Simulación tienda online | Proyecto escolar</p>
</footer>

</body>
</html>
